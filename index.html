<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <?!= include('styles'); ?>
  </head>

  <body>

    <!-- BANNER -->
    <header class="banner">
      <img
        src="https://i.imgur.com/GVJiEI2.png"
        alt="Cherokee Invitational Banner">
    </header>

    <!-- NAVIGATION -->
    <nav class="nav">
      <button onclick="showPage('home')">Events</button>
      <button onclick="showPage('register')">Register</button>
      <button onclick="showPage('chat')">Chat</button>
      <button onclick="showPage('leaderboard')">Leaderboard</button>
    </nav>

    <!-- CHANNEL DRAWER OVERLAY (ONLY USED IN CHAT) -->
    <div class="channel-drawer-backdrop" id="channel-backdrop" onclick="closeChannelDrawer(event)">
      <div class="channel-drawer" onclick="event.stopPropagation()">
        <div class="drawer-title">Channels</div>
        <div class="channel-list" id="channel-list"></div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="content">

      <!-- HOME PAGE -->
      <section id="home" class="page">
        <section class="hero">
          <h1>Events</h1>
        <p>Welcome back to the third annual Cherokee Invitational.</p>
        </section>

        <section class="events-grid" id="events-grid">
          <div class="events-loading">Loading events...</div>
        </section>
      </section>

      <!-- REGISTER PAGE -->
      <section id="register" class="page" style="display:none;">
        <div class="panel">
          <h2>Register / Check In</h2>
          <?!= include('client'); ?>
        </div>
      </section>

      <!-- CHAT PAGE -->
      <section id="chat" class="page chat-page" style="display:none;">
        <div class="chat-shell">

          <aside class="chat-sidebar" id="chat-sidebar">
            <div class="chat-workspace">Cherokee</div>
            <div class="chat-sidebar-label">Channels</div>
            <div class="chat-sidebar-list" id="desktop-channel-list"></div>
          </aside>

          <section class="chat-main">
            <div class="chat-header">
              <div class="chat-header-left">
                <button class="channel-toggle" onclick="openChannelDrawer()">Channels</button>
                <div>
                  <div class="chat-channel-name" id="chat-channel-name">Practice Round</div>
                  <div class="chat-header-sub">Cherokee Invitational Chat - build 2026-05-28</div>
                </div>
              </div>
            </div>

            <div class="chat-name-select">
              <input id="chat-name" type="text" placeholder="Start typing your name...">
              <div id="name-suggestions" class="suggestions"></div>
            </div>

            <div id="chat-messages" class="chat-messages"></div>

            <div class="chat-input-bar">
              <input id="chat-text" type="text" placeholder="Message #Practice Round">
              <button onclick="sendMessage()">Send</button>
            </div>
          </section>

        </div>
      </section>

      <!-- LEADERBOARD PAGE -->
      <section id="leaderboard" class="page" style="display:none;">
        <div class="panel">
          <h2>Leaderboard</h2>
          <p>Leaderboard module coming soon.</p>
        </div>
      </section>

    </main>

    <!-- SCRIPT -->
    <script>
      const CHANNELS = [
        "Practice Round",
        "Tournament",
        "Sportsbook",
        "Casino",
        "Ruth's Chris",
        "Hotel",
        "Driving",
        "Shit Talk"
      ];

      let replyTo = null;
      let selectedUser = null;
      let currentChannel = CHANNELS[0];
      let lastSeen = {};
      window.entryNames = [];

      /* PAGE SWITCHING */
      function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(page).style.display = 'block';
        document.body.classList.toggle("chat-active", page === "chat");

        const backdrop = document.getElementById('channel-backdrop');
        if (page !== 'chat') {
          backdrop.classList.remove('open');
        } else {
          if (isNarrowScreen()) {
            document.getElementById('chat-sidebar').classList.remove('open');
          }
          loadChat(true);
        }
      }

      /* DRAWER */
      function openChannelDrawer() {
        document.getElementById('channel-backdrop').classList.add('open');
        document.getElementById('chat-sidebar').classList.add('open');
      }

      function closeChannelDrawer(e) {
        document.getElementById('channel-backdrop').classList.remove('open');
        if (isNarrowScreen()) {
          document.getElementById('chat-sidebar').classList.remove('open');
        }
      }

      /* BUILD CHANNEL LIST */
      function buildChannelDrawer() {
        renderChannelList(document.getElementById("channel-list"));
        renderChannelList(document.getElementById("desktop-channel-list"));
      }

      function renderChannelList(list) {
        if (!list) return;
        list.innerHTML = "";
        CHANNELS.forEach(ch => {
          const button = document.createElement("button");
          button.className = "channel-item" + (ch === currentChannel ? " channel-active" : "");
          button.dataset.channel = ch;
          button.onclick = () => {
            switchChannel(ch);
            closeChannelDrawer();
          };

          const label = document.createElement("span");
          label.textContent = "# " + ch;

          const badge = document.createElement("span");
          badge.id = "badge-" + badgeKey(ch);

          button.appendChild(label);
          button.appendChild(badge);
          list.appendChild(button);
        });
      }

      /* SWITCH CHANNEL */
      function switchChannel(ch) {
        currentChannel = ch;
        replyTo = null;

        document.getElementById('chat-channel-name').textContent = ch;
        document.getElementById('chat-text').placeholder = "Message #" + ch;

        document.querySelectorAll('.channel-item').forEach(el => {
          el.classList.toggle('channel-active', el.dataset.channel === ch);
        });

        loadChat();
        clearBadge(ch);
      }

      function clearBadge(ch) {
        const badge = document.getElementById("badge-" + badgeKey(ch));
        if (badge) badge.textContent = "";
        lastSeen[ch] = new Date().toISOString();
        localStorage.setItem("ci_lastSeen", JSON.stringify(lastSeen));
      }

      /* NAME AUTOCOMPLETE */
      function loadNames() {
        google.script.run
          .withSuccessHandler(names => {
            window.entryNames = names || [];
          })
          .withFailureHandler(err => showToast(err.message || "Could not load registered names."))
          .getEntryNames();
      }

      function loadEvents() {
        google.script.run
          .withSuccessHandler(renderEvents)
          .withFailureHandler(err => {
            const grid = document.getElementById("events-grid");
            grid.innerHTML = "";
            const error = document.createElement("div");
            error.className = "events-loading";
            error.textContent = err.message || "Could not load events.";
            grid.appendChild(error);
          })
          .getItineraryEvents();
      }

      function renderEvents(events) {
        const grid = document.getElementById("events-grid");
        grid.innerHTML = "";

        if (!events || !events.length) {
          const empty = document.createElement("div");
          empty.className = "events-loading";
          empty.textContent = "No itinerary events found yet.";
          grid.appendChild(empty);
          return;
        }

        events.forEach((event, index) => {
          const card = document.createElement("article");
          card.className = "event-card";

          const imageWrap = document.createElement("div");
          imageWrap.className = "event-image-wrap";

          if (event.image) {
            const image = document.createElement("img");
            image.className = "event-image";
            image.src = event.image;
            image.alt = event.title || "Cherokee Invitational event";
            image.onerror = () => imageWrap.classList.add("event-image-missing");
            imageWrap.appendChild(image);
          } else {
            imageWrap.classList.add("event-image-missing");
          }

          const body = document.createElement("div");
          body.className = "event-card-body";

          const meta = document.createElement("div");
          meta.className = "event-meta";
          meta.textContent = [event.date, event.time].filter(Boolean).join(" / ");

          const title = document.createElement("h2");
          title.textContent = event.title || "Event";

          const location = document.createElement("div");
          location.className = "event-location";
          location.textContent = event.location || "";

          const notes = document.createElement("p");
          notes.textContent = event.notes || "";

          const type = document.createElement("span");
          type.className = "event-type";
          type.textContent = event.type || "event";

          const actions = document.createElement("div");
          actions.className = "event-actions";

          const calendarLink = document.createElement("a");
          calendarLink.className = "calendar-button";
          calendarLink.href = buildCalendarDataUrl(event, index);
          calendarLink.download = calendarFileName(event);
          calendarLink.textContent = "Add to Calendar";
          calendarLink.setAttribute("aria-label", "Add " + (event.title || "event") + " to calendar");

          actions.appendChild(calendarLink);

          body.appendChild(meta);
          body.appendChild(title);
          body.appendChild(location);
          body.appendChild(notes);
          body.appendChild(type);
          body.appendChild(actions);
          card.appendChild(imageWrap);
          card.appendChild(body);
          grid.appendChild(card);
        });
      }

      function buildCalendarDataUrl(event, index) {
        const ics = buildIcsEvent(event, index);
        return "data:text/calendar;charset=utf-8," + encodeURIComponent(ics);
      }

      function buildIcsEvent(event, index) {
        const dateInfo = parseEventDate(event.date);
        const timeInfo = parseEventTime(event.time);
        const uid = "cherokee-invitational-" + index + "-" + slugify(event.title || "event") + "@cherokee-invitational";
        const now = new Date().toISOString().replace(/[-:]/g, "").replace(/\.\d{3}Z$/, "Z");
        const lines = [
          "BEGIN:VCALENDAR",
          "VERSION:2.0",
          "PRODID:-//Cherokee Invitational//Events//EN",
          "CALSCALE:GREGORIAN",
          "METHOD:PUBLISH",
          "BEGIN:VEVENT",
          "UID:" + uid,
          "DTSTAMP:" + now,
          "SUMMARY:" + escapeIcs(event.title || "Cherokee Invitational Event"),
          "LOCATION:" + escapeIcs(event.location || ""),
          "DESCRIPTION:" + escapeIcs(event.notes || "")
        ];

        if (dateInfo && timeInfo) {
          const start = new Date(dateInfo.year, dateInfo.month - 1, dateInfo.day, timeInfo.hour, timeInfo.minute);
          const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);
          lines.push("DTSTART:" + formatIcsDateTime(start));
          lines.push("DTEND:" + formatIcsDateTime(end));
        } else if (dateInfo) {
          lines.push("DTSTART;VALUE=DATE:" + formatIcsDate(dateInfo));
          lines.push("DTEND;VALUE=DATE:" + formatIcsDate(addDays(dateInfo, 1)));
        }

        lines.push("END:VEVENT");
        lines.push("END:VCALENDAR");
        return lines.join("\r\n");
      }

      function parseEventDate(value) {
        const match = String(value || "").match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if (!match) return null;
        return {
          month: Number(match[1]),
          day: Number(match[2]),
          year: Number(match[3])
        };
      }

      function parseEventTime(value) {
        const text = String(value || "").trim();
        if (!text || /^tbd$/i.test(text)) return null;

        const firstTime = text.split(/\s*(-|to|until)\s*/i)[0].trim();
        const match = firstTime.match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)?$/i);
        if (!match) return null;

        let hour = Number(match[1]);
        const minute = Number(match[2] || 0);
        const meridiem = (match[3] || "").toUpperCase();

        if (meridiem === "PM" && hour < 12) hour += 12;
        if (meridiem === "AM" && hour === 12) hour = 0;

        return { hour, minute };
      }

      function formatIcsDate(dateInfo) {
        return String(dateInfo.year) + pad2(dateInfo.month) + pad2(dateInfo.day);
      }

      function formatIcsDateTime(date) {
        return date.getFullYear()
          + pad2(date.getMonth() + 1)
          + pad2(date.getDate())
          + "T"
          + pad2(date.getHours())
          + pad2(date.getMinutes())
          + "00";
      }

      function addDays(dateInfo, days) {
        const date = new Date(dateInfo.year, dateInfo.month - 1, dateInfo.day + days);
        return {
          year: date.getFullYear(),
          month: date.getMonth() + 1,
          day: date.getDate()
        };
      }

      function escapeIcs(value) {
        return String(value || "")
          .replace(/\\/g, "\\\\")
          .replace(/\n/g, "\\n")
          .replace(/,/g, "\\,")
          .replace(/;/g, "\\;");
      }

      function calendarFileName(event) {
        return slugify(event.title || "cherokee-event") + ".ics";
      }

      function slugify(value) {
        return String(value || "event")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 60) || "event";
      }

      function pad2(value) {
        return String(value).padStart(2, "0");
      }

      document.addEventListener("input", e => {
        if (e.target.id !== "chat-name") return;

        const val = e.target.value.toLowerCase();
        const box = document.getElementById("name-suggestions");
        box.innerHTML = "";
        selectedUser = findRegisteredName(e.target.value);

        if (!val || !window.entryNames) return;

        const matches = window.entryNames
          .filter(n => n.toLowerCase().includes(val))
          .slice(0, 8);

        matches.forEach(name => {
          const div = document.createElement("div");
          div.className = "suggestion";
          div.textContent = name;
          div.onclick = () => {
            selectedUser = name;
            document.getElementById("chat-name").value = name;
            box.innerHTML = "";
          };
          box.appendChild(div);
        });
      });

      document.addEventListener("keydown", e => {
        if (e.target.id === "chat-text" && e.key === "Enter") {
          e.preventDefault();
          sendMessage();
        }
      });

      /* SEND MESSAGE */
      function sendMessage() {
        const text = document.getElementById('chat-text').value.trim();
        const user = selectedUser || findRegisteredName(document.getElementById("chat-name").value);

        if (!user) {
          alert("Select a registered name first.");
          return;
        }
        if (!text) return;

        google.script.run
          .withSuccessHandler(() => {
            document.getElementById('chat-text').value = "";
            replyTo = null;
            loadChat();
          })
          .withFailureHandler(err => showToast(err.message || "Message could not be sent."))
          .saveChatMessage(user, currentChannel, text, replyTo);
      }

      /* LOAD CHAT */
      function loadChat() {
        const requestedChannel = currentChannel;
        renderLoading(false);

        google.script.run
          .withSuccessHandler(data => {
            if (requestedChannel !== currentChannel) return;
            renderChat(data);
          })
          .withFailureHandler(err => showChatError(err.message || "Could not load chat."))
          .getChatData(requestedChannel);
      }

      /* RENDER CHAT */
      function renderChat(data) {
        if (data && Array.isArray(data.names)) {
          window.entryNames = data.names;
        }

        const snapshotMessages = data && Array.isArray(data.messages) ? data.messages : [];
        const messages = snapshotMessages.filter(Boolean);
        const container = document.getElementById('chat-messages');
        container.innerHTML = "";

        if (!messages.length) {
          const empty = document.createElement("div");
          empty.className = "chat-empty";
          empty.textContent = "No messages in this channel yet.";
          container.appendChild(empty);
          return;
        }

        const threads = messages.filter(m => !m.parent);
        const visibleThreads = threads.length ? threads : messages;

        visibleThreads.forEach(thread => {
          const msgDiv = document.createElement('div');
          msgDiv.className = "chat-message";
          msgDiv.appendChild(createBubble(thread, false));

          const replies = threads.length ? messages.filter(m => m.parent === thread.id) : [];
          if (replies.length) {
            const replyBlock = document.createElement('div');
            replyBlock.className = "chat-reply-block";

            replies.forEach(r => {
              replyBlock.appendChild(createBubble(r, true));
            });

            msgDiv.appendChild(replyBlock);
          }

          container.appendChild(msgDiv);
        });

        container.scrollTop = container.scrollHeight;
      }

      function createBubble(message, isReply) {
        const row = document.createElement('div');
        row.className = isReply ? "chat-reply-row" : "chat-message-row";

        const avatar = document.createElement('div');
        avatar.className = "chat-avatar";
        avatar.textContent = initials(message.user);

        const bubble = document.createElement('div');
        bubble.className = isReply ? "chat-reply-bubble" : "chat-bubble";

        const header = document.createElement('div');
        header.className = "chat-message-header";

        const user = document.createElement('span');
        user.className = isReply ? "chat-reply-user" : "chat-user";
        user.textContent = message.user || "Guest";

        const meta = document.createElement('span');
        meta.className = isReply ? "chat-reply-meta" : "chat-meta";
        meta.textContent = formatTime(message.time);

        const text = document.createElement('div');
        text.className = isReply ? "chat-reply-text" : "chat-text";
        text.textContent = message.text || "";

        if (!isReply) {
          const reply = document.createElement('span');
          reply.className = "chat-reply-button";
          reply.textContent = "Reply";
          reply.onclick = () => setReply(message.id);
          header.appendChild(user);
          header.appendChild(meta);
          header.appendChild(reply);
        } else {
          header.appendChild(user);
          header.appendChild(meta);
        }

        bubble.appendChild(header);
        bubble.appendChild(text);
        row.appendChild(avatar);
        row.appendChild(bubble);

        return row;
      }

      function setReply(id) {
        replyTo = id;
        const input = document.getElementById('chat-text');
        input.placeholder = "Replying in #" + currentChannel;
        input.focus();
      }

      function formatTime(t) {
        try {
          const d = new Date(t);
          return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        } catch (e) {
          return "";
        }
      }

      function showToast(text) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.textContent = text;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      function showChatError(text) {
        const container = document.getElementById('chat-messages');
        container.innerHTML = "";

        const error = document.createElement("div");
        error.className = "chat-empty";
        error.textContent = text;
        container.appendChild(error);

        showToast(text);
      }

      function renderLoading(force) {
        const container = document.getElementById('chat-messages');
        if (!force && container.childElementCount) return;
        container.innerHTML = "";

        const loading = document.createElement("div");
        loading.className = "chat-empty";
        loading.textContent = "Loading messages...";
        container.appendChild(loading);
      }

      function initState() {
        const stored = localStorage.getItem("ci_lastSeen");
        try {
          lastSeen = stored ? JSON.parse(stored) : {};
        } catch (e) {
          lastSeen = {};
        }
      }

      function findRegisteredName(value) {
        const typed = value.trim().toLowerCase();
        if (!typed || !window.entryNames) return null;
        return window.entryNames.find(name => name.toLowerCase() === typed) || null;
      }

      function isChatVisible() {
        return document.getElementById("chat").style.display !== "none";
      }

      function isNarrowScreen() {
        return window.matchMedia("(max-width: 1199px)").matches;
      }

      function badgeKey(ch) {
        return ch.replace(/\s+/g, "");
      }

      function initials(name) {
        return String(name || "?")
          .split(/\s+/)
          .filter(Boolean)
          .slice(0, 2)
          .map(part => part[0].toUpperCase())
          .join("");
      }

      /* INIT */
      initState();
      buildChannelDrawer();
      loadEvents();
      loadNames();
      loadChat();
      setInterval(() => {
        if (isChatVisible()) loadChat();
      }, 8000);
    </script>

  </body>
</html>
