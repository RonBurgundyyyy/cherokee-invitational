<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cherokee Invitational</title>
    <style>
      :root {
        --app-scale: 1.75;
      }

      html,
      body {
        background: #000;
        margin: 0;
        min-height: 100%;
        overflow-x: hidden;
        padding: 0;
        width: 100%;
      }

      .app-frame-wrap {
        background: #000;
        height: calc(100dvh / var(--app-scale));
        overflow: visible;
        transform: scale(var(--app-scale));
        transform-origin: top left;
        width: calc(100vw / var(--app-scale));
      }

      iframe {
        border: 0;
        display: block;
        height: calc(100dvh / var(--app-scale));
        margin: 0;
        padding: 0;
        width: calc(100vw / var(--app-scale));
      }
    </style>
  </head>
  <body>
    <div class="app-frame-wrap">
      <iframe
        src="https://script.google.com/macros/s/AKfycbxaPxWqLRxyNk1rKkS8rCyYUZHHTlJByOn7XV96kSczZBbcp9xYIV80OYKvVDYohB6F/exec"
        title="Cherokee Invitational"
        allowfullscreen>
      </iframe>
    </div>
  </body>
</html>
