<style>
  :root {
    --gold: #ffd700;
    --neon: #00ff66;
    --chat-bg: #101010;
    --chat-panel: #151515;
    --chat-sidebar: #1d111d;
    --chat-text: #ffffff;
    --chat-muted: #a8a8a8;
  }

  html {
    background: #000;
    color: #fff;
    font-family: "Segoe UI", sans-serif;
    font-size: 18px;
  }

  body {
    margin: 0;
    padding: 0;
  }

  .banner img {
    display: block;
    height: auto;
    max-height: 320px;
    object-fit: cover;
    width: 100%;
  }

  .content {
    margin: 0 auto;
    max-width: 1100px;
    padding: clamp(16px, 3vw, 32px);
  }

  .content:has(#chat:not([style*="display:none"])) {
    box-sizing: border-box;
    max-width: 100%;
    min-height: calc(100vh - 420px);
    padding-bottom: 0;
  }

  body.chat-active .content {
    box-sizing: border-box;
    max-width: 100%;
    min-height: calc(100vh - 420px);
    padding-bottom: 0;
  }

  .hero {
    margin: 1.5rem 0;
    text-align: center;
  }

  .hero h1 {
    color: var(--gold);
    margin: 0;
    text-shadow: 0 0 12px var(--gold);
  }

  .hero p {
    color: var(--neon);
    margin: 0.4rem 0 0;
    text-shadow: 0 0 10px var(--neon);
  }

  .panel {
    background: #0a0a0a;
    border: 1px solid rgba(255, 215, 0, 0.3);
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
    padding: 1.2rem;
  }

  .panel h2 {
    color: var(--gold);
    margin-top: 0;
    text-shadow: 0 0 10px var(--gold);
  }

  .panel p {
    line-height: 1.4;
    margin: 0.4rem 0 0;
  }

  .nav {
    background: #0a0a0a;
    border-bottom: 1px solid rgba(255, 215, 0, 0.25);
    box-shadow: 0 0 12px rgba(0, 255, 102, 0.2);
    display: flex;
    justify-content: space-around;
    padding: 0.6rem 0;
  }

  .nav button {
    background: none;
    border: none;
    color: var(--gold);
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.4rem 0.8rem;
    text-shadow: 0 0 8px var(--gold);
    width: auto;
  }

  .nav button:hover {
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon);
  }

  .entry-form {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .form-row {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .form-row label {
    color: var(--gold);
    font-size: 1rem;
    font-weight: 600;
  }

  .entry-form input {
    background: #0d0d0d;
    border: 1px solid #333;
    border-radius: 10px;
    box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.6);
    color: #fff;
    font-size: 1rem;
    padding: 0.75rem 1rem;
  }

  .form-section-title {
    color: var(--neon);
    font-size: 1.1rem;
    font-weight: 700;
    margin-top: 0.5rem;
    text-shadow: 0 0 10px var(--neon);
  }

  .checkbox-grid {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .checkbox-item {
    align-items: center;
    background: #0a0a0a;
    border: 1px solid rgba(255, 215, 0, 0.25);
    border-radius: 10px;
    box-shadow: 0 0 12px rgba(0, 255, 102, 0.15);
    color: var(--gold);
    display: flex;
    font-size: 0.95rem;
    gap: 0.6rem;
    padding: 0.75rem 1rem;
  }

  .checkbox-item input[type="checkbox"] {
    accent-color: var(--neon);
    height: 1.2rem;
    width: 1.2rem;
  }

  .submit-btn {
    background: linear-gradient(90deg, var(--neon), var(--gold));
    border: none;
    border-radius: 12px;
    box-shadow: 0 0 16px var(--gold);
    color: #000;
    cursor: pointer;
    font-size: 1.2rem;
    font-weight: 700;
    margin-top: 0.5rem;
    padding: 0.9rem;
    transition: transform 0.15s ease;
  }

  .submit-btn:hover {
    transform: scale(1.04);
  }

  #entry-status {
    font-weight: 700;
    margin-top: 0.5rem;
    min-height: 1.2rem;
  }

  .chat-page {
    box-sizing: border-box;
    display: flex;
    min-height: calc(100vh - 420px);
    padding: 0;
  }

  .chat-shell {
    background: var(--chat-bg);
    border: 1px solid #242424;
    border-radius: 8px;
    display: grid;
    font-size: 16px;
    grid-template-columns: 240px minmax(0, 1fr);
    min-height: calc(100vh - 420px);
    overflow: hidden;
    width: 100%;
  }

  .chat-sidebar {
    background: var(--chat-sidebar);
    border-right: 1px solid #2f2230;
    display: flex;
    flex-direction: column;
    min-width: 0;
    padding: 14px 10px;
  }

  .chat-workspace {
    color: #fff;
    font-size: 18px;
    font-weight: 800;
    padding: 4px 8px 14px;
  }

  .chat-sidebar-label {
    color: #ad9fad;
    font-size: 12px;
    font-weight: 700;
    padding: 8px;
    text-transform: uppercase;
  }

  .chat-sidebar-list,
  .channel-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .chat-main {
    background: #101010;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .chat-header {
    align-items: center;
    background: #111;
    border-bottom: 1px solid #242424;
    display: flex;
    justify-content: space-between;
    min-height: 64px;
    padding: 10px 18px;
  }

  .chat-header-left {
    align-items: center;
    display: flex;
    gap: 12px;
    min-width: 0;
  }

  .chat-channel-name {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.2;
  }

  .chat-header-sub {
    color: var(--chat-muted);
    font-size: 13px;
  }

  .channel-toggle {
    display: none;
  }

  .chat-header button {
    background: #242424;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    box-shadow: none;
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    padding: 8px 12px;
    width: auto;
  }

  .chat-name-select {
    border-bottom: 1px solid #242424;
    padding: 10px 18px;
    position: relative;
  }

  .chat-name-select input {
    background: #151515;
    border: 1px solid #333;
    border-radius: 8px;
    box-sizing: border-box;
    color: #fff;
    font-size: 15px;
    padding: 10px 14px;
    width: 100%;
  }

  .suggestions {
    background: #151515;
    border: 1px solid #333;
    border-radius: 8px;
    left: 18px;
    max-height: 180px;
    overflow-y: auto;
    position: absolute;
    right: 18px;
    top: 54px;
    z-index: 20;
  }

  .suggestion {
    cursor: pointer;
    font-size: 14px;
    padding: 8px 12px;
  }

  .suggestion:hover {
    background: #242424;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px;
  }

  .chat-message {
    margin-bottom: 8px;
  }

  .chat-empty {
    color: var(--chat-muted);
    font-size: 14px;
    padding: 12px 4px;
  }

  .chat-message-row,
  .chat-reply-row {
    display: grid;
    gap: 10px;
    grid-template-columns: 36px minmax(0, 1fr);
    margin-bottom: 12px;
  }

  .chat-reply-row {
    margin: 8px 0 0;
  }

  .chat-avatar {
    align-items: center;
    background: linear-gradient(135deg, #19c76f, #ffd700);
    border-radius: 6px;
    color: #061006;
    display: flex;
    font-size: 13px;
    font-weight: 800;
    height: 34px;
    justify-content: center;
    width: 34px;
  }

  .chat-bubble,
  .chat-reply-bubble {
    min-width: 0;
  }

  .chat-message-header {
    align-items: baseline;
    display: flex;
    gap: 8px;
    min-width: 0;
  }

  .chat-user,
  .chat-reply-user {
    color: #fff;
    font-size: 14px;
    font-weight: 800;
  }

  .chat-text,
  .chat-reply-text {
    color: var(--chat-text);
    font-size: 15px;
    line-height: 1.35;
    overflow-wrap: anywhere;
  }

  .chat-meta,
  .chat-reply-meta {
    color: var(--chat-muted);
    font-size: 12px;
  }

  .chat-reply-block {
    border-left: 2px solid #333;
    margin-left: 46px;
    margin-top: 6px;
    padding-left: 10px;
  }

  .chat-reply-button {
    color: var(--chat-muted);
    cursor: pointer;
    font-size: 12px;
  }

  .chat-reply-button:hover {
    color: var(--neon);
  }

  .chat-input-bar {
    align-items: center;
    background: #111;
    border-top: 1px solid #242424;
    display: flex;
    gap: 10px;
    padding: 12px 18px;
  }

  .chat-input-bar input {
    background: #151515;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    flex: 1;
    font-size: 15px;
    min-width: 0;
    padding: 12px 14px;
  }

  .chat-input-bar button {
    background: linear-gradient(90deg, var(--neon), var(--gold));
    border: none;
    border-radius: 8px;
    box-shadow: 0 0 10px var(--gold);
    color: #000;
    cursor: pointer;
    font-size: 15px;
    padding: 12px 16px;
    width: auto;
  }

  .channel-drawer-backdrop {
    background: rgba(0, 0, 0, 0.55);
    display: none;
    inset: 0;
    position: fixed;
    z-index: 40;
  }

  .channel-drawer-backdrop.open {
    display: block;
  }

  .channel-drawer {
    background: var(--chat-sidebar);
    border-right: 1px solid #2f2230;
    box-shadow: 4px 0 16px rgba(0, 0, 0, 0.6);
    font-size: 16px;
    height: 100%;
    left: 0;
    padding: 60px 8px 0;
    position: absolute;
    top: 0;
    width: 260px;
  }

  .drawer-title {
    border-bottom: 1px solid #2f2230;
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    padding: 0 8px 10px;
  }

  .channel-list {
    padding: 8px 0;
  }

  .channel-item {
    align-items: center;
    background: transparent;
    border: 0;
    border-radius: 6px;
    color: #ddd;
    cursor: pointer;
    display: flex;
    font-size: 14px;
    justify-content: space-between;
    padding: 8px 10px;
    text-align: left;
    width: 100%;
  }

  .channel-item:hover {
    background: rgba(255, 255, 255, 0.08);
  }

  .channel-active {
    background: #1264a3;
    color: #fff;
    font-weight: 800;
  }

  .unread-badge {
    background: var(--neon);
    border-radius: 999px;
    color: #000;
    font-size: 12px;
    font-weight: 800;
    padding: 1px 7px;
  }

  .toast {
    animation: fadeInOut 3s ease;
    background: var(--neon);
    border-radius: 10px;
    bottom: 20px;
    box-shadow: 0 0 12px rgba(0, 255, 102, 0.8);
    color: #000;
    font-size: 14px;
    font-weight: 800;
    padding: 0.8rem 1.2rem;
    position: fixed;
    right: 20px;
    z-index: 50;
  }

  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateY(20px); }
    10% { opacity: 1; transform: translateY(0); }
    90% { opacity: 1; }
    100% { opacity: 0; transform: translateY(20px); }
  }

  @media (max-width: 768px) {
    html {
      font-size: 16px;
    }

    .banner img {
      max-height: 160px;
    }

    .content {
      box-sizing: border-box;
      padding: 12px;
    }

    .content:has(#chat:not([style*="display:none"])) {
      min-height: calc(100vh - 286px);
      padding-bottom: 0;
    }

    body.chat-active .content {
      min-height: calc(100vh - 286px);
      padding-bottom: 0;
    }

    .nav button {
      font-size: 0.88rem;
      padding: 0.35rem 0.45rem;
    }

    .chat-shell {
      grid-template-columns: 1fr;
      min-height: calc(100vh - 286px);
    }

    .chat-sidebar {
      display: none;
    }

    .channel-toggle {
      display: inline-flex;
    }

    .chat-header {
      min-height: 58px;
      padding: 8px 12px;
    }

    .chat-channel-name {
      font-size: 16px;
    }

    .chat-header-sub {
      font-size: 12px;
    }

    .chat-name-select,
    .chat-messages,
    .chat-input-bar {
      padding-left: 12px;
      padding-right: 12px;
    }

    .chat-input-bar {
      gap: 8px;
    }

    .chat-input-bar input {
      font-size: 14px;
    }

    .chat-input-bar button {
      font-size: 14px;
      padding: 12px 14px;
    }
  }
</style>
