<style>
  :root {
    --gold: #ffd700;
    --neon: #00ff66;

    --chat-bg: #0d0d0d;
    --chat-bubble: #1a1a1a;
    --chat-bubble-reply: #151515;
    --chat-text: #ffffff;
    --chat-muted: #aaaaaa;
  }

  html {
    font-size: clamp(18px, 4vw, 28px);
    background: #000;
    color: #fff;
    font-family: "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    padding: 0;
  }

  .banner img {
    width: 100%;
    height: auto;
    display: block;
    max-height: 320px;
    object-fit: cover;
  }

  .content {
    max-width: 1100px;
    margin: 0 auto;
    padding: clamp(16px, 3vw, 32px);
  }

  .hero {
    text-align: center;
    margin: 1.5rem 0;
  }

  .hero h1 {
    margin: 0;
    color: var(--gold);
    text-shadow: 0 0 12px var(--gold);
  }

  .hero p {
    margin: 0.4rem 0 0;
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon);
  }

  .panel {
    background: #0a0a0a;
    border-radius: 12px;
    padding: 1.2rem;
    border: 1px solid rgba(255, 215, 0, 0.3);
    box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
  }

  .panel h2 {
    margin-top: 0;
    color: var(--gold);
    text-shadow: 0 0 10px var(--gold);
  }

  .panel p {
    margin: 0.4rem 0 0;
    line-height: 1.4;
  }

  .nav {
    display: flex;
    justify-content: space-around;
    background: #0a0a0a;
    padding: 0.6rem 0;
    border-bottom: 1px solid rgba(255,215,0,0.25);
    box-shadow: 0 0 12px rgba(0,255,102,0.2);
  }

  .nav button {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    padding: 0.4rem 0.8rem;
    text-shadow: 0 0 8px var(--gold);
    width: auto;
  }

  .nav button:hover {
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon);
  }

  /* ENTRY FORM */

  .entry-form {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .form-row {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .form-row label {
    font-size: 1rem;
    color: var(--gold);
    font-weight: 600;
  }

  .entry-form input {
    padding: 0.75rem 1rem;
    border-radius: 10px;
    border: 1px solid #333;
    background: #0d0d0d;
    color: #fff;
    font-size: 1rem;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
  }

  .form-section-title {
    margin-top: 0.5rem;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon);
  }

  .checkbox-grid {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.95rem;
    color: var(--gold);
    background: #0a0a0a;
    padding: 0.75rem 1rem;
    border-radius: 10px;
    border: 1px solid rgba(255,215,0,0.25);
    box-shadow: 0 0 12px rgba(0,255,102,0.15);
  }

  .checkbox-item input[type="checkbox"] {
    width: 1.2rem;
    height: 1.2rem;
    accent-color: var(--neon);
  }

  .submit-btn {
    margin-top: 0.5rem;
    padding: 0.9rem;
    font-size: 1.2rem;
    font-weight: 700;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: linear-gradient(90deg, var(--neon), var(--gold));
    color: #000;
    box-shadow: 0 0 16px var(--gold);
    transition: transform 0.15s ease;
  }

  .submit-btn:hover {
    transform: scale(1.04);
  }

  #entry-status {
    min-height: 1.2rem;
    font-weight: 700;
    margin-top: 0.5rem;
  }

  /* CHAT – SLACK DARK MODE STYLE */

  .chat-page {
    padding: 0;
  }

  .chat-shell {
    background: var(--chat-bg);
    border-radius: 16px;
    padding: 0;
    display: flex;
    flex-direction: column;
    height: min(70vh, 640px);
    overflow: hidden;
  }

  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.9rem;
    border-bottom: 1px solid #222;
    background: #111;
  }

  .chat-header-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .chat-channel-name {
    font-weight: 700;
    font-size: 0.95rem;
  }

  .chat-header-sub {
    font-size: 0.75rem;
    color: var(--chat-muted);
  }

  .chat-header button {
    width: auto;
    padding: 0.4rem 0.8rem;
    font-size: 0.85rem;
    border-radius: 999px;
    background: #222;
    color: #fff;
    box-shadow: none;
  }

  .chat-header button:hover {
    transform: none;
    background: #333;
  }

  .chat-name-select {
    padding: 0.5rem 0.9rem;
    border-bottom: 1px solid #222;
    position: relative;
  }

  .chat-name-select input {
    width: 100%;
    padding: 0.5rem 0.7rem;
    border-radius: 999px;
    border: 1px solid #333;
    background: #111;
    color: #fff;
    font-size: 0.85rem;
  }

  .suggestions {
    position: absolute;
    left: 0.9rem;
    right: 0.9rem;
    top: 2.4rem;
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    max-height: 180px;
    overflow-y: auto;
    z-index: 20;
  }

  .suggestion {
    padding: 0.4rem 0.7rem;
    font-size: 0.85rem;
    cursor: pointer;
  }

  .suggestion:hover {
    background: #222;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 0.7rem 0.9rem 0.4rem;
  }

  .chat-message {
    margin-bottom: 0.6rem;
    max-width: 90%;
  }

  .chat-empty {
    color: var(--chat-muted);
    font-size: 0.85rem;
    padding: 0.7rem 0.2rem;
  }

  .chat-bubble {
    background: var(--chat-bubble);
    border-radius: 16px;
    padding: 0.45rem 0.7rem 0.35rem;
  }

  .chat-user {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--neon);
    margin-bottom: 0.1rem;
  }

  .chat-text {
    font-size: 0.9rem;
    color: var(--chat-text);
  }

  .chat-meta {
    font-size: 0.7rem;
    color: var(--chat-muted);
    margin-top: 0.15rem;
  }

  .chat-reply-block {
    margin-left: 1.4rem;
    margin-top: 0.3rem;
    border-left: 2px solid #333;
    padding-left: 0.5rem;
  }

  .chat-reply-bubble {
    background: var(--chat-bubble-reply);
    border-radius: 16px;
    padding: 0.35rem 0.6rem 0.3rem;
  }

  .chat-reply-user {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--neon);
    margin-bottom: 0.05rem;
  }

  .chat-reply-text {
    font-size: 0.85rem;
    color: var(--chat-text);
  }

  .chat-reply-meta {
    font-size: 0.7rem;
    color: var(--chat-muted);
    margin-top: 0.1rem;
  }

  .chat-reply-button {
    margin-top: 0.15rem;
    font-size: 0.75rem;
    color: var(--chat-muted);
    cursor: pointer;
  }

  .chat-reply-button:hover {
    color: var(--neon);
  }

  .chat-input-bar {
    border-top: 1px solid #222;
    padding: 0.5rem 0.9rem;
    background: #111;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .chat-input-bar input {
    flex: 1;
    padding: 0.55rem 0.8rem;
    border-radius: 999px;
    border: 1px solid #333;
    background: #151515;
    color: #fff;
    font-size: 0.9rem;
  }

  .chat-input-bar button {
    width: auto;
    padding: 0.5rem 0.9rem;
    font-size: 0.85rem;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--neon), var(--gold));
    color: #000;
    box-shadow: 0 0 10px var(--gold);
  }

  .chat-input-bar button:hover {
    transform: none;
  }

  /* CHANNEL DRAWER – SLIDE OVER */

  .channel-drawer-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    z-index: 40;
  }

  .channel-drawer-backdrop.open {
    display: block;
  }

  .channel-drawer {
    position: absolute;
    top: 0;
    left: 0;
    width: 260px;
    height: 100%;
    background: #111;
    border-right: 1px solid #222;
    box-shadow: 4px 0 16px rgba(0,0,0,0.6);
    padding-top: 60px;
  }

  .drawer-title {
    color: #fff;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 0 1rem 0.4rem;
    border-bottom: 1px solid #222;
  }

  .channel-list {
    padding: 0.4rem 0;
  }

  .channel-item {
    padding: 0.45rem 1rem;
    color: #ddd;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .channel-item:hover {
    background: #1b1b1b;
  }

  .channel-active {
    background: #222;
    font-weight: 700;
  }

  .unread-badge {
    background: var(--neon);
    color: #000;
    padding: 0.1rem 0.45rem;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 700;
  }

  /* TOAST */

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--neon);
    color: #000;
    padding: 0.8rem 1.2rem;
    border-radius: 10px;
    font-weight: 700;
    box-shadow: 0 0 12px rgba(0,255,102,0.8);
    animation: fadeInOut 3s ease;
    z-index: 50;
    font-size: 0.85rem;
  }

  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateY(20px); }
    10% { opacity: 1; transform: translateY(0); }
    90% { opacity: 1; }
    100% { opacity: 0; transform: translateY(20px); }
  }

  @media (max-width: 768px) {
    .banner img {
      max-height: 220px;
    }
  }
</style>
