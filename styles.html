<style>
  :root {
    --gold: #ffd700;
    --neon: #00ff66;
    --chat-bg: #101010;
    --chat-panel: #151515;
    --chat-sidebar: #07140b;
    --chat-text: #ffffff;
    --chat-muted: #a8a8a8;
  }

  html {
    background: #000;
    color: #fff;
    font-family: "Segoe UI", sans-serif;
    font-size: 24px;
  }

  body {
    margin: 0;
    overflow-x: hidden;
    padding: 0;
    min-width: 0;
    width: 100%;
  }

  .banner img {
    display: block;
    height: auto;
    max-height: 320px;
    object-fit: cover;
    width: 100%;
  }

  .content {
    box-sizing: border-box;
    margin: 0;
    max-width: 100%;
    padding: 16px;
    width: 100%;
  }

  .content:has(#chat:not([style*="display:none"])) {
    box-sizing: border-box;
    max-width: 100%;
    min-height: calc(100vh - 420px);
    padding-bottom: 0;
  }

  body.chat-active .content {
    box-sizing: border-box;
    max-width: 100%;
    min-height: calc(100vh - 420px);
    padding-bottom: 0;
  }

  .hero {
    margin: 1.5rem 0;
    text-align: center;
  }

  .hero h1 {
    color: var(--gold);
    font-size: 38px;
    margin: 0;
    text-shadow: 0 0 12px var(--gold);
  }

  .hero p {
    color: var(--neon);
    font-size: 18px;
    margin: 0.4rem 0 0;
    text-shadow: 0 0 10px var(--neon);
  }

  .events-grid {
    display: grid;
    gap: 18px;
    grid-template-columns: 1fr;
  }

  .events-loading {
    color: var(--chat-muted);
    font-size: 1rem;
    padding: 1rem 0;
  }

  .event-card {
    background: #101010;
    border: 1px solid rgba(255, 215, 0, 0.25);
    border-radius: 8px;
    box-shadow: 0 0 18px rgba(0, 255, 102, 0.12);
    display: grid;
    grid-template-columns: 1fr;
    overflow: hidden;
    width: 100%;
  }

  .event-image-wrap {
    aspect-ratio: 16 / 9;
    background: #171717;
    overflow: hidden;
  }

  .event-image {
    display: block;
    height: 100%;
    object-fit: cover;
    width: 100%;
  }

  .event-image-missing {
    background:
      linear-gradient(135deg, rgba(0, 255, 102, 0.25), rgba(255, 215, 0, 0.22)),
      #151515;
  }

  .event-card-body {
    padding: 18px;
  }

  .event-meta {
    color: var(--neon);
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .event-card h2 {
    color: #fff;
    font-size: 30px;
    line-height: 1.15;
    margin: 0 0 8px;
  }

  .event-location {
    color: var(--gold);
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .event-card p {
    color: #ddd;
    font-size: 20px;
    line-height: 1.35;
    margin: 0 0 14px;
  }

  .event-type {
    background: rgba(255, 215, 0, 0.14);
    border: 1px solid rgba(255, 215, 0, 0.35);
    border-radius: 999px;
    color: var(--gold);
    display: inline-flex;
    font-size: 16px;
    font-weight: 800;
    padding: 4px 10px;
    text-transform: uppercase;
  }

  .event-actions {
    margin-top: 18px;
  }

  .trip-calendar-actions {
    margin: 22px 0 6px;
  }

  .trip-calendar-button {
    text-transform: uppercase;
  }

  .calendar-button {
    align-items: center;
    background: linear-gradient(90deg, var(--neon), var(--gold));
    border-radius: 8px;
    box-shadow: 0 0 14px rgba(255, 215, 0, 0.45);
    color: #000;
    display: flex;
    font-size: 22px;
    font-weight: 900;
    justify-content: center;
    padding: 14px 16px;
    text-align: center;
    text-decoration: none;
    width: 100%;
  }

  .calendar-button:active,
  .calendar-button:hover {
    filter: brightness(1.08);
  }

  .rules-layout {
    display: grid;
    gap: 18px;
    grid-template-columns: 1fr;
  }

  .rules-card {
    background:
      linear-gradient(135deg, rgba(0, 255, 102, 0.08), rgba(255, 215, 0, 0.04)),
      #101010;
    border: 1px solid rgba(255, 215, 0, 0.26);
    border-radius: 12px;
    box-shadow: 0 0 18px rgba(0, 255, 102, 0.14);
    overflow: hidden;
    padding: 22px;
  }

  .rules-kicker {
    color: var(--neon);
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .rules-card h2 {
    color: #fff;
    font-size: 34px;
    line-height: 1.1;
    margin: 8px 0 10px;
  }

  .rules-card p,
  .rules-list {
    color: #e8e8e8;
    font-size: 22px;
    line-height: 1.35;
    margin: 0;
  }

  .rules-pot h2 {
    color: var(--gold);
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
  }

  .bonus-list {
    display: grid;
    gap: 14px;
    margin-top: 14px;
  }

  .bonus-item {
    align-items: start;
    background: rgba(0, 0, 0, 0.32);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    display: grid;
    gap: 14px;
    grid-template-columns: 68px minmax(0, 1fr);
    padding: 14px;
  }

  .bonus-item > span {
    align-items: center;
    border-radius: 999px;
    color: #061006;
    display: flex;
    font-size: 24px;
    font-weight: 950;
    height: 58px;
    justify-content: center;
    width: 58px;
  }

  .bonus-item strong {
    color: #fff;
    display: block;
    font-size: 24px;
    line-height: 1.2;
  }

  .bonus-item p {
    color: var(--chat-muted);
    font-size: 20px;
    margin-top: 4px;
  }

  .bonus-blue > span,
  .legend-dot.bonus-blue {
    background: #38d9ff;
  }

  .bonus-green > span,
  .legend-dot.bonus-green,
  .scorecard .ctp-hole {
    background: #00ff66;
    color: #001f0d;
  }

  .bonus-purple > span,
  .legend-dot.bonus-purple,
  .scorecard .long-drive-hole {
    background: #9b5cff;
    color: #fff;
  }

  .bonus-yellow > span,
  .legend-dot.bonus-yellow,
  .scorecard .happy-hole {
    background: #ffd700;
    color: #181300;
  }

  .bonus-red > span,
  .legend-dot.bonus-red,
  .scorecard .fireball-hole {
    background: #ff3030;
    color: #fff;
  }

  .rules-list {
    padding-left: 1.1rem;
  }

  .rules-list li + li {
    margin-top: 12px;
  }

  .scorecard-card {
    margin-top: 18px;
    padding: 0;
  }

  .scorecard-header {
    align-items: start;
    display: grid;
    gap: 14px;
    grid-template-columns: 1fr;
    padding: 22px;
  }

  .scorecard-legend {
    color: #ddd;
    display: flex;
    flex-wrap: wrap;
    font-size: 18px;
    font-weight: 800;
    gap: 10px 14px;
  }

  .legend-dot {
    border-radius: 999px;
    display: inline-block;
    height: 18px;
    margin-right: -8px;
    width: 18px;
  }

  .scorecard-scroll {
    overflow-x: auto;
    padding: 0 0 18px;
  }

  .scorecard {
    border-collapse: collapse;
    min-width: 980px;
    width: 100%;
  }

  .scorecard th,
  .scorecard td {
    border: 1px solid rgba(255, 215, 0, 0.2);
    font-size: 19px;
    padding: 12px 10px;
    text-align: center;
  }

  .scorecard th {
    background: rgba(255, 215, 0, 0.12);
    color: var(--gold);
    font-weight: 900;
  }

  .scorecard tbody th {
    color: #fff;
    position: sticky;
    left: 0;
    z-index: 1;
  }

  .scorecard td {
    background: rgba(0, 0, 0, 0.35);
    color: #eee;
  }

  .leaderboard-hero {
    margin-bottom: 1rem;
  }

  .leaderboard-broadcast {
    background:
      linear-gradient(180deg, rgba(255, 215, 0, 0.08), rgba(0, 255, 102, 0.04)),
      #070907;
    border: 1px solid rgba(255, 215, 0, 0.32);
    border-radius: 14px;
    box-shadow:
      0 0 26px rgba(0, 255, 102, 0.16),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }

  .leaderboard-topbar {
    align-items: center;
    background:
      linear-gradient(90deg, #07140b, #0f2a13 48%, #1d1600),
      #111;
    border-bottom: 2px solid rgba(255, 215, 0, 0.65);
    display: flex;
    justify-content: space-between;
    padding: 18px 22px;
  }

  .leaderboard-topbar strong {
    color: #fff;
    display: block;
    font-size: 32px;
    line-height: 1.1;
    text-transform: uppercase;
  }

  .broadcast-label {
    color: var(--gold);
    display: block;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .broadcast-live {
    background: #e81725;
    border-radius: 999px;
    box-shadow: 0 0 12px rgba(232, 23, 37, 0.65);
    color: #fff;
    font-size: 18px;
    font-weight: 950;
    letter-spacing: 0.08em;
    padding: 8px 14px;
    text-transform: uppercase;
  }

  .leaderboard-table-wrap {
    overflow-x: auto;
  }

  .leaderboard-table {
    border-collapse: collapse;
    min-width: 940px;
    width: 100%;
  }

  .leaderboard-table th {
    background: #ece8d7;
    border-bottom: 1px solid rgba(0, 0, 0, 0.3);
    color: #121212;
    font-size: 17px;
    font-weight: 950;
    letter-spacing: 0.08em;
    padding: 10px 12px;
    text-align: left;
    text-transform: uppercase;
  }

  .leaderboard-table td {
    background: rgba(11, 17, 12, 0.94);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    color: #f8f8f8;
    font-size: 24px;
    font-weight: 800;
    padding: 15px 12px;
    vertical-align: middle;
  }

  .leaderboard-table tr:nth-child(even) td {
    background: rgba(18, 28, 20, 0.96);
  }

  .leaderboard-table .leader-row td {
    background:
      linear-gradient(90deg, rgba(255, 215, 0, 0.2), rgba(0, 255, 102, 0.08)),
      #14210f;
    box-shadow: inset 0 1px 0 rgba(255, 215, 0, 0.35);
  }

  .leaderboard-table .pos {
    color: var(--gold);
    font-size: 26px;
    width: 70px;
  }

  .leaderboard-table .team {
    color: #fff;
    min-width: 180px;
  }

  .leaderboard-table .total {
    background: #f5f0d9;
    color: #09120b;
    font-size: 30px;
    text-align: center;
    width: 100px;
  }

  .leaderboard-table .leader-row .total {
    background: var(--gold);
    color: #080800;
  }

  .leaderboard-table .thru,
  .leaderboard-table .strokes,
  .leaderboard-table .base {
    color: #dce6dc;
    text-align: center;
    width: 110px;
  }

  .badges-cell {
    min-width: 250px;
  }

  .badge-rail {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .badge-pill {
    background: rgba(0, 255, 102, 0.12);
    border: 1px solid rgba(0, 255, 102, 0.38);
    border-radius: 999px;
    color: var(--neon);
    font-size: 16px;
    font-weight: 900;
    padding: 6px 10px;
    text-transform: uppercase;
  }

  .empty-badge {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.14);
    color: var(--chat-muted);
  }

  .leaderboard-mobile {
    display: none;
  }

  .leaderboard-card,
  .leaderboard-empty {
    background: rgba(13, 18, 14, 0.96);
    border: 1px solid rgba(255, 215, 0, 0.24);
    border-radius: 12px;
    box-shadow: 0 0 16px rgba(0, 255, 102, 0.12);
    padding: 16px;
  }

  .leader-card {
    border-color: rgba(255, 215, 0, 0.75);
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.22);
  }

  .leaderboard-card-top {
    align-items: center;
    display: grid;
    gap: 12px;
    grid-template-columns: 44px minmax(0, 1fr) 82px;
  }

  .leaderboard-position {
    align-items: center;
    background: var(--gold);
    border-radius: 8px;
    color: #0a0a0a;
    display: flex;
    font-size: 24px;
    font-weight: 950;
    height: 44px;
    justify-content: center;
    width: 44px;
  }

  .leaderboard-team {
    color: #fff;
    font-size: 28px;
    font-weight: 950;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .leaderboard-total {
    background: #f5f0d9;
    border-radius: 8px;
    color: #09120b;
    font-size: 30px;
    font-weight: 950;
    padding: 8px 0;
    text-align: center;
  }

  .leaderboard-stats {
    display: grid;
    gap: 8px;
    grid-template-columns: repeat(3, 1fr);
    margin: 14px 0;
  }

  .leaderboard-stat {
    background: rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    padding: 10px;
  }

  .leaderboard-stat span {
    color: var(--chat-muted);
    display: block;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .leaderboard-stat strong {
    color: #fff;
    display: block;
    font-size: 24px;
    margin-top: 2px;
  }

  .leaderboard-card-badges {
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    padding-top: 12px;
  }

  .booking-hero {
    margin-bottom: 1rem;
  }

  .booking-summary {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    margin-bottom: 18px;
  }

  .booking-stat {
    background:
      linear-gradient(135deg, rgba(0, 255, 102, 0.13), rgba(255, 215, 0, 0.08)),
      #0a0f0b;
    border: 1px solid rgba(255, 215, 0, 0.28);
    border-radius: 12px;
    box-shadow: 0 0 18px rgba(0, 255, 102, 0.12);
    padding: 16px;
  }

  .booking-stat span,
  .booking-meta span {
    color: var(--chat-muted);
    display: block;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .booking-stat strong {
    color: var(--gold);
    display: block;
    font-size: 30px;
    line-height: 1.1;
    margin-top: 6px;
  }

  .booking-stat small {
    color: var(--neon);
    display: block;
    font-size: 14px;
    font-weight: 800;
    margin-top: 6px;
  }

  .booking-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  }

  .booking-card {
    background:
      radial-gradient(circle at top right, rgba(255, 215, 0, 0.14), transparent 34%),
      linear-gradient(180deg, rgba(0, 255, 102, 0.06), rgba(255, 215, 0, 0.03)),
      #0d0d0d;
    border: 1px solid rgba(255, 215, 0, 0.22);
    border-radius: 14px;
    box-shadow: 0 0 18px rgba(0, 255, 102, 0.12);
    overflow: hidden;
    padding: 18px;
  }

  .booking-card-secured {
    border-color: rgba(0, 255, 102, 0.55);
    box-shadow: 0 0 22px rgba(0, 255, 102, 0.18);
  }

  .booking-card-header {
    align-items: start;
    display: flex;
    gap: 12px;
    justify-content: space-between;
  }

  .booking-card h2 {
    color: #fff;
    font-size: 26px;
    line-height: 1.1;
    margin: 0;
    text-transform: uppercase;
  }

  .booking-meter-label {
    background: var(--gold);
    border-radius: 999px;
    color: #061006;
    flex: 0 0 auto;
    font-size: 16px;
    font-weight: 950;
    padding: 6px 10px;
  }

  .booking-progress {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 999px;
    height: 10px;
    margin: 14px 0;
    overflow: hidden;
  }

  .booking-progress span {
    background: linear-gradient(90deg, var(--neon), var(--gold));
    display: block;
    height: 100%;
  }

  .booking-steps {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .booking-step {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 999px;
    color: var(--chat-muted);
    font-size: 13px;
    font-weight: 900;
    padding: 6px 9px;
    text-transform: uppercase;
  }

  .booking-step-complete {
    background: rgba(0, 255, 102, 0.13);
    border-color: rgba(0, 255, 102, 0.48);
    color: var(--neon);
  }

  .booking-update {
    color: #e8e8e8;
    font-size: 18px;
    line-height: 1.35;
    margin: 16px 0;
  }

  .booking-meta {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(3, 1fr);
  }

  .booking-meta div {
    background: rgba(255, 255, 255, 0.055);
    border-radius: 10px;
    padding: 10px;
  }

  .booking-meta strong {
    color: #fff;
    display: block;
    font-size: 18px;
    line-height: 1.15;
    margin-top: 4px;
  }

  .booking-contract-link {
    background: linear-gradient(90deg, var(--neon), var(--gold));
    border-radius: 10px;
    color: #061006;
    display: flex;
    font-size: 17px;
    font-weight: 950;
    justify-content: center;
    margin-top: 16px;
    padding: 12px;
    text-decoration: none;
    text-transform: uppercase;
  }

  .booking-loading {
    background: #0d0d0d;
    border: 1px solid rgba(255, 215, 0, 0.22);
    border-radius: 12px;
    color: var(--chat-muted);
    font-size: 20px;
    padding: 18px;
  }

  .golfers-hero {
    margin-bottom: 1rem;
  }

  .golfers-summary {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    margin-bottom: 18px;
  }

  .golfer-stat {
    background:
      linear-gradient(135deg, rgba(255, 215, 0, 0.12), rgba(0, 255, 102, 0.08)),
      #0a0f0b;
    border: 1px solid rgba(255, 215, 0, 0.28);
    border-radius: 12px;
    box-shadow: 0 0 18px rgba(255, 215, 0, 0.1);
    padding: 16px;
  }

  .golfer-stat span {
    color: var(--chat-muted);
    display: block;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .golfer-stat strong {
    color: var(--gold);
    display: block;
    font-size: 34px;
    line-height: 1;
    margin-top: 8px;
  }

  .golfer-stat small {
    color: var(--neon);
    display: block;
    font-size: 14px;
    font-weight: 800;
    margin-top: 6px;
  }

  .golfers-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  }

  .golfer-card {
    background:
      radial-gradient(circle at top left, rgba(0, 255, 102, 0.14), transparent 34%),
      linear-gradient(180deg, rgba(255, 215, 0, 0.06), rgba(0, 255, 102, 0.03)),
      #0d0d0d;
    border: 1px solid rgba(255, 215, 0, 0.22);
    border-radius: 14px;
    box-shadow: 0 0 18px rgba(0, 255, 102, 0.12);
    padding: 18px;
  }

  .golfer-card-header {
    align-items: start;
    display: flex;
    gap: 12px;
    justify-content: space-between;
  }

  .golfer-card h2 {
    color: #fff;
    font-size: 27px;
    line-height: 1.1;
    margin: 0;
  }

  .golfer-handicap {
    background: var(--gold);
    border-radius: 12px;
    color: #061006;
    flex: 0 0 auto;
    min-width: 58px;
    padding: 7px 9px;
    text-align: center;
  }

  .golfer-handicap span {
    display: block;
    font-size: 11px;
    font-weight: 950;
    letter-spacing: 0.08em;
  }

  .golfer-handicap strong {
    display: block;
    font-size: 24px;
    line-height: 1;
    margin-top: 2px;
  }

  .golfer-commitments {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  .golfer-commitment {
    background: rgba(0, 255, 102, 0.13);
    border: 1px solid rgba(0, 255, 102, 0.42);
    border-radius: 999px;
    color: var(--neon);
    font-size: 14px;
    font-weight: 900;
    padding: 7px 10px;
    text-transform: uppercase;
  }

  .golfers-loading {
    background: #0d0d0d;
    border: 1px solid rgba(255, 215, 0, 0.22);
    border-radius: 12px;
    color: var(--chat-muted);
    font-size: 20px;
    padding: 18px;
  }

  .gallery-hero {
    margin-bottom: 1rem;
  }

  .gallery-upload-panel {
    background:
      radial-gradient(circle at top right, rgba(0, 255, 102, 0.16), transparent 34%),
      linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(0, 255, 102, 0.05)),
      #0d0d0d;
    border: 1px solid rgba(255, 215, 0, 0.28);
    border-radius: 14px;
